apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: jwt-auth-policy
  namespace: agentgateway-system
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: agentgateway-proxy
  traffic:
    jwtAuthentication:
      mode: Strict
      providers:
      - issuer: "https://<your-auth0-domain>/"
        audiences:
        - "https://mcp.gateway"
        jwks:
          inline: '{"keys":[{"kty":"RSA","use":"sig","n":"<base64url-modulus>","e":"AQAB","kid":"<key-id-1>","alg":"RS256"},{"kty":"RSA","use":"sig","n":"<base64url-modulus>","e":"AQAB","kid":"<key-id-2>","alg":"RS256"}]}'
